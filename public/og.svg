<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1F2937" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="90" width="1020" height="450" rx="36" fill="#FFFFFF"/>
  </g>

  <rect x="140" y="150" width="140" height="140" rx="32" fill="url(#brand)"/>
  <text x="210" y="248" font-family="Arial, sans-serif" font-size="96" font-weight="700" fill="#FFFFFF" text-anchor="middle">S</text>

  <text x="310" y="215" font-family="Arial, sans-serif" font-size="64" font-weight="700" fill="#0F172A">Salarize</text>
  <text x="310" y="275" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#475569">
    Reporting des couts salariaux
  </text>

  <g transform="translate(140 330)">
    <rect width="920" height="160" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="40" y="40" width="220" height="14" rx="7" fill="#E2E8F0"/>
    <rect x="40" y="72" width="520" height="12" rx="6" fill="#E2E8F0"/>
    <rect x="40" y="98" width="420" height="12" rx="6" fill="#E2E8F0"/>
    <rect x="640" y="40" width="220" height="80" rx="16" fill="#EEF2FF"/>
    <rect x="660" y="64" width="180" height="12" rx="6" fill="#C7D2FE"/>
    <rect x="660" y="88" width="140" height="12" rx="6" fill="#C7D2FE"/>
  </g>
</svg>
