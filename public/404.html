<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salarize</title>
    <meta name="robots" content="noindex" />
    <script>
      (function () {
        var l = window.location;
        var base = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
        var path = l.pathname.replace(/^\/+/, '').replace(/&/g, '~and~');
        var query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
        l.replace(base + '/?/' + path + query + l.hash);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
